
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sand simulator with velocity</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            font-weight: bold;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        .btn {
            padding: 6px 20px;
            padding-left: 3px;
            background: rgba(255, 255, 255, 0.317);
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
            margin: 0 5px 5px 0;
            display: inline-block;
            backdrop-filter: blur(10px);
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .btn.selected {
            border: 2px solid #fff;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.417);
        }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.117);
            color: #fff;
        }

        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.217);
        }

        .tools {
            position: fixed;
            top: 0;
            padding: 10px;
        }
        #content {
            display: flex;
            height: 100vh;
            flex-direction: row;
        }
        #leftbox {
            width: 200px;
            max-width: 200px;
            background-color: #222;
            color: #fff;
            padding: 20px;
        }
        #rightbox {
            flex-grow: 1;
        }
        #canvas {
            background-color: rgb(50, 50, 52);
            position: inherit;
            width: calc(100vw - 200px); /* Adjust width to account for #leftbox */
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="content">
        <div id="leftbox">
            Stuf
        </div>
        <div id="rightbox">
            <canvas id="canvas"></canvas>
            <div class="tools" id="materialSelector">
                <label class="btn">
                    <input type="radio" name="materialSelector" value="0" checked>
                    <span>Eraser</span>
                </label>
                <label class="btn">
                    <input type="radio" name="materialSelector" value="1">
                    <span>Sand</span>
                </label>
                <label class="btn">
                    <input type="radio" name="materialSelector" value="2">
                    <span>Water</span>
                </label>
                <label class="btn">
                    <input type="radio" name="materialSelector" value="3">
                    <span>Wall</span>
                </label>
            </div>

        </div>
    </div>
    <script src="./main.js"></script>
</body>

</html>
